<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Listing</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --text-main: #24292e;
            --text-muted: #586069;
            --border-color: #e1e4e8;
            --link-color: #0366d6;
            --link-hover: #f1f8ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 1px 3px rgba(27,31,35,0.04);
            overflow: hidden;
        }

        .header {
            background-color: var(--bg-color);
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            border-bottom: 1px solid var(--border-color);
        }

        li:last-child {
            border-bottom: none;
        }

        a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: var(--text-main);
            transition: background-color 0.2s ease;
            cursor: pointer;
        }

        a:hover {
            background-color: var(--link-hover);
            color: var(--link-color);
        }

        .icon {
            margin-right: 12px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .back-btn {
            background-color: #f1f8ff;
            font-weight: 600;
        }

        .status-message {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .error {
            color: #cb2431;
            background: #ffeef0;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem;
            border: 1px solid #fdaeb7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="title">Loading repository...</h1>
        </div>
        <div id="content">
            <div class="status-message">Connecting to GitHub API...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ CONFIGURATION 🛠️
        // ==========================================
        const CONFIG = {
            owner: 'physicalsmithness', 
            repo: 'sundairy'        
        };
        // ==========================================

        const contentDiv = document.getElementById('content');
        const titleEl = document.getElementById('title');

        async function fetchDirectory(currentPath = '') {
            // Update title to show current location
            titleEl.textContent = currentPath === '' ? `Index of /${CONFIG.repo}` : `Index of /${currentPath}`;
            contentDiv.innerHTML = '<div class="status-message">Fetching files...</div>';

            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${currentPath}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`GitHub API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                let html = '<ul>';

                // If we are inside a subfolder, add a "Back" button
                if (currentPath !== '') {
                    // Calculate the parent path
                    let pathParts = currentPath.split('/');
                    pathParts.pop(); // Remove the current folder
                    let parentPath = pathParts.join('/');
                    
                    html += `<li><a class="back-btn" onclick="fetchDirectory('${parentPath}')"><span class="icon">🔙</span>.. (Up a directory)</a></li>`;
                }

                // Sort: Folders first, then files
                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                let itemCount = 0;

                data.forEach(item => {
                    if (item.type === 'dir') {
                        // 📁 DIRECTORY: Clicking it runs this function again with the new path
                        html += `<li><a onclick="fetchDirectory('${item.path}')"><span class="icon">📁</span>${item.name}/</a></li>`;
                        itemCount++;
                    } 
                    else if (item.name.endsWith('.html') && item.name !== 'index.html') {
                        // 📄 HTML FILE: Clicking it acts as a normal link to open the page
                        html += `<li><a href="${item.path}"><span class="icon">📄</span>${item.name}</a></li>`;
                        itemCount++;
                    }
                });

                html += '</ul>';

                if (itemCount === 0) {
                    html += '<div class="status-message">No HTML files found in this folder.</div>';
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `<div class="error"><strong>Failed to load contents:</strong> ${error.message}</div>`;
            }
        }

        // Start the app by fetching the root folder
        fetchDirectory();
    </script>
</body>
</html>
