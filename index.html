<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Listing</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --text-main: #24292e;
            --text-muted: #586069;
            --border-color: #d1d5da;
            --link-color: #0366d6;
            --link-hover: #f1f8ff;
            --block-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-color);
        }

        .header {
            background-color: var(--block-bg);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 3px rgba(27,31,35,0.04);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        /* The Grid Layout for the Blocks */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            /* Creates columns that automatically fit the space, minimum 180px wide */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem; 
        }

        li {
            display: block;
        }

        /* The Block Buttons */
        a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            text-decoration: none;
            color: var(--text-main);
            background-color: var(--block-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
            text-align: center;
            height: 100%;
            box-sizing: border-box;
            box-shadow: 0 1px 3px rgba(27,31,35,0.04);
            font-weight: 500;
        }

        /* Hover Effect: slightly lifts the block and highlights the border */
        a:hover {
            background-color: var(--link-hover);
            border-color: var(--link-color);
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(3, 102, 214, 0.15);
            color: var(--link-color);
        }

        .icon {
            font-size: 3rem; /* Much larger icons for the blocks */
            margin-bottom: 12px;
            opacity: 0.9;
        }
        
        /* Special styling for the 'Up a directory' button */
        .back-btn {
            background-color: #eef1f5;
            border-style: dashed;
            border-width: 2px;
        }

        .back-btn:hover {
            background-color: #e1e4e8;
            border-color: var(--text-muted);
            color: var(--text-main);
            box-shadow: none;
            transform: translateY(-1px);
        }

        .status-message {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1; /* Spans the full width of the grid */
            background: var(--block-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .error {
            color: #cb2431;
            background: #ffeef0;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #fdaeb7;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="title">Loading repository...</h1>
        </div>
        <div id="content">
            <div class="status-message">Connecting to GitHub API...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ CONFIGURATION 🛠️
        // ==========================================
        const CONFIG = {
            owner: 'physicalsmithness', 
            repo: 'sundairy'        
        };
        // ==========================================

        const contentDiv = document.getElementById('content');
        const titleEl = document.getElementById('title');

        async function fetchDirectory(currentPath = '') {
            // Update title
            titleEl.textContent = currentPath === '' ? `/${CONFIG.repo}` : `/${CONFIG.repo}/${currentPath}`;
            contentDiv.innerHTML = '<div class="status-message">Fetching files...</div>';

            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${currentPath}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`GitHub API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                let html = '<ul>';

                // Add Back Button block if not in root
                if (currentPath !== '') {
                    let pathParts = currentPath.split('/');
                    pathParts.pop();
                    let parentPath = pathParts.join('/');
                    html += `<li><a class="back-btn" onclick="fetchDirectory('${parentPath}')"><div class="icon">🔙</div>Back</a></li>`;
                }

                // Sort: Folders first, then files
                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                let itemCount = 0;

                data.forEach(item => {
                    if (item.type === 'dir') {
                        html += `<li><a onclick="fetchDirectory('${item.path}')"><div class="icon">📁</div>${item.name}</a></li>`;
                        itemCount++;
                    } 
                    else if (item.name.endsWith('.html') && item.name !== 'index.html') {
                        html += `<li><a href="${item.path}"><div class="icon">📄</div>${item.name}</a></li>`;
                        itemCount++;
                    }
                });

                html += '</ul>';

                if (itemCount === 0) {
                    html = '<ul><li class="status-message" style="grid-column: 1 / -1;">No HTML files or folders found here.</li></ul>';
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `<div class="error"><strong>Failed to load contents:</strong> ${error.message}</div>`;
            }
        }

        // Start
        fetchDirectory();
    </script>
</body>
</html>
