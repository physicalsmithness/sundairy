    <style>
        /* A softer, modern palette */
        :root {
            --bg-color: #f0f4f8;       /* Soft blue-grey background */
            --text-main: #334155;      /* Slate text */

        body {

        .header {

        }

        h1 {
            font-size: 1.5rem;

            letter-spacing: -0.025em;
        }

        li {

        }

        a {

            background-color: var(--block-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-align: center;
            height: 100%;
            box-sizing: border-box;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            font-weight: 500;
            
            /* Keeps long text from breaking the layout */
            overflow-wrap: break-word;
            word-wrap: break-word;
            hyphens: auto;
            width: 100%;
        }

        a:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

    </style>
<!-- GA4 interaction tracking -->
<script>
(function () {
  if (window.__ga4InteractionTrackingInstalled) return;
  window.__ga4InteractionTrackingInstalled = true;

  var trackableSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"], [role="tab"], [role="menuitem"], [data-ga4-click], [onclick]';
  var maxLength = 120;

  function clean(value, limit) {
    var text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, limit || maxLength);
  }

  function getLabel(element) {
    if (!element) return '';
    var tag = (element.tagName || '').toLowerCase();
    var type = (element.getAttribute('type') || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea') && !/^(button|submit|reset|checkbox|radio)$/.test(type)) {
      return clean(element.getAttribute('aria-label') || element.getAttribute('title') || element.getAttribute('name') || tag);
    }
    return clean(
      element.getAttribute('data-ga4-label') ||
      element.getAttribute('aria-label') ||
      element.getAttribute('title') ||
      element.innerText ||
      element.textContent ||
      element.getAttribute('name') ||
      element.getAttribute('id') ||
      tag
    );
  }

  function getClasses(element) {
    if (!element || !element.classList) return '';
    return clean(Array.prototype.slice.call(element.classList, 0, 6).join(' '));
  }

  function getTargetPath(element) {
    var parts = [];
    var current = element;
    while (current && current.nodeType === 1 && current !== document.body && parts.length < 5) {
      var part = (current.tagName || '').toLowerCase();
      var id = current.getAttribute('id');
      var testId = current.getAttribute('data-testid') || current.getAttribute('data-test') || current.getAttribute('data-ga4-id');
      if (id) {
        part += '#' + clean(id, 60);
        parts.unshift(part);
        break;
      }
      if (testId) part += '[data-id="' + clean(testId, 60) + '"]';
      var classes = getClasses(current).split(' ').filter(Boolean).slice(0, 2);
      if (classes.length) part += '.' + classes.join('.');
      parts.unshift(part);
      current = current.parentElement;
    }
    return clean(parts.join(' > '), 220);
  }

  function sendClickEvent(element) {
    if (typeof gtag !== 'function') return;
    var tag = (element.tagName || '').toLowerCase();
    var params = {
      event_category: 'engagement',
      element_type: tag,
      element_id: clean(element.getAttribute('id')),
      element_name: clean(element.getAttribute('name')),
      element_role: clean(element.getAttribute('role')),
      element_classes: getClasses(element),
      element_label: getLabel(element),
      click_target: getTargetPath(element),
      page_path: clean(window.location.pathname, 220)
    };

    if (tag === 'input') params.input_type = clean(element.getAttribute('type') || 'text');

    var href = element.getAttribute('href') || element.href;
    if (href) {
      try {
        var url = new URL(href, window.location.href);
        params.link_url = clean(url.href, 500);
        params.link_domain = clean(url.hostname);
        params.outbound = url.hostname !== window.location.hostname ? 'true' : 'false';
      } catch (error) {
        params.link_url = clean(href, 500);
      }
    }

    try {
      gtag('event', 'site_click', params);
    } catch (error) {
      // Analytics should never interfere with the page.
    }
  }

  document.addEventListener('click', function (event) {
    if (!event.target || !event.target.closest) return;
    var element = event.target.closest(trackableSelector);
    if (!element || !document.documentElement.contains(element)) return;
    sendClickEvent(element);
  }, true);
})();
</script>

<body>

    <div class="container">
        <div class="header">
            <h1 id="title">Loading repository...</h1>
        </div>
        <div id="content">
            <div class="status-message">Connecting to GitHub API...</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            owner: 'physicalsmithness', 
            repo: 'sundairy'        
        };

        const contentDiv = document.getElementById('content');
        const titleEl = document.getElementById('title');

        // Function to clean up file and folder names
        function formatDisplayName(filename, isFile) {
            let name = filename;
            
            // If it's an HTML file, remove the extension
            if (isFile && name.endsWith('.html')) {
                name = name.replace('.html', '');
            }
            
            // Replace underscores and hyphens with spaces
            name = name.replace(/[_-]/g, ' ');
            
            // Capitalize the first letter of each word
            return name.replace(/\b\w/g, function(char) {
                return char.toUpperCase();
            });
        }

        async function fetchDirectory(currentPath = '') {
            titleEl.textContent = currentPath === '' ? `/${CONFIG.repo}` : `/${CONFIG.repo}/${currentPath}`;
            contentDiv.innerHTML = '<div class="status-message">Fetching files...</div>';

            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${currentPath}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`GitHub API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                let html = '<ul>';

                if (currentPath !== '') {
                    let pathParts = currentPath.split('/');
                    pathParts.pop();
                    let parentPath = pathParts.join('/');
                    html += `<li><a class="back-btn" onclick="fetchDirectory('${parentPath}')"><div class="icon">🔙</div>Go Back</a></li>`;
                }

                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                let itemCount = 0;

                data.forEach(item => {
                    if (item.type === 'dir') {
                        const displayName = formatDisplayName(item.name, false);
                        html += `<li><a onclick="fetchDirectory('${item.path}')"><div class="icon">📁</div>${displayName}</a></li>`;
                        itemCount++;
                    } 
                    else if (item.name.endsWith('.html') && item.name !== 'index.html') {
                        const displayName = formatDisplayName(item.name, true);
                        html += `<li><a href="${item.path}"><div class="icon">📄</div>${displayName}</a></li>`;
                        itemCount++;
                    }
                });

                html += '</ul>';

                if (itemCount === 0) {
                    html = '<ul><li class="status-message" style="grid-column: 1 / -1;">No HTML files or folders found here.</li></ul>';
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `<div class="error"><strong>Failed to load contents:</strong> ${error.message}</div>`;
            }
        }

        fetchDirectory();
    </script>
</body>
