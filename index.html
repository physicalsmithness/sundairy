<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Listing</title>
    <style>
        /* Modern, visually appealing GitHub-like styling */
        :root {
            --bg-color: #f6f8fa;
            --text-main: #24292e;
            --text-muted: #586069;
            --border-color: #e1e4e8;
            --link-color: #0366d6;
            --link-hover: #f1f8ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 1px 3px rgba(27,31,35,0.04);
            overflow: hidden;
        }

        .header {
            background-color: var(--bg-color);
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            border-bottom: 1px solid var(--border-color);
        }

        li:last-child {
            border-bottom: none;
        }

        a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: var(--text-main);
            transition: background-color 0.2s ease;
        }

        a:hover {
            background-color: var(--link-hover);
            color: var(--link-color);
        }

        .icon {
            margin-right: 12px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .status-message {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .error {
            color: #cb2431;
            background: #ffeef0;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem;
            border: 1px solid #fdaeb7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="title">Loading directory...</h1>
        </div>
        <div id="content">
            <div class="status-message">Connecting to GitHub API...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ CONFIGURATION 🛠️
        // Set up for physicalsmithness/sundairy
        // ==========================================
        const CONFIG = {
            owner: 'physicalsmithness', 
            repo: 'sundairy',        
            path: ''       
        };
        // ==========================================

        const contentDiv = document.getElementById('content');
        const titleEl = document.getElementById('title');

        async function fetchDirectory() {
            // Safety check to ensure user configured the script
            if (CONFIG.owner === 'YOUR_GITHUB_USERNAME') {
                contentDiv.innerHTML = `<div class="error"><strong>Setup Required:</strong> Please open this index.html file in a text editor and fill in your GitHub username, repo name, and folder path in the CONFIG section.</div>`;
                titleEl.textContent = "Configuration Error";
                return;
            }

            // If path is empty, display just the repo name in the header
            titleEl.textContent = CONFIG.path ? `Index of /${CONFIG.path}` : `Index of ${CONFIG.repo}`;

            try {
                // Fetch the contents of the repository from the GitHub API
                const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`GitHub API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                let html = '<ul>';

                // Sort the results: directories at the top, then files alphabetically
                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                let itemCount = 0;

                data.forEach(item => {
                    // Handle Directories
                    if (item.type === 'dir') {
                        html += `<li><a href="${item.name}/"><span class="icon">📁</span>${item.name}/</a></li>`;
                        itemCount++;
                    } 
                    // Handle HTML files (excluding this index.html itself)
                    else if (item.name.endsWith('.html') && item.name !== 'index.html') {
                        html += `<li><a href="${item.name}"><span class="icon">📄</span>${item.name}</a></li>`;
                        itemCount++;
                    }
                });

                html += '</ul>';

                if (itemCount === 0) {
                    html = '<div class="status-message">This folder has no HTML files or subfolders.</div>';
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Failed to load directory contents:</strong> ${error.message}
                        <br><br>
                        <small>Troubleshooting: Ensure your repo is public, the repository names in the script are correct, and that you haven't hit the GitHub API rate limit.</small>
                    </div>`;
            }
        }

        // Initialize
        fetchDirectory();
    </script>
</body>
</html>
