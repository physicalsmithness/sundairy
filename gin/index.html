<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gin interactives</title>
  <style>
    :root {
      --bg: #eef7f0;
      --panel: #ffffff;
      --line: #d7e7da;
      --text: #163624;
      --muted: #5a7665;
      --accent: #2f8f5a;
      --shadow: 0 14px 34px rgba(34, 74, 49, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(143, 226, 200, 0.35), transparent 24%),
        radial-gradient(circle at top right, rgba(243, 216, 107, 0.24), transparent 22%),
        linear-gradient(180deg, #f7fff9 0%, var(--bg) 100%);
    }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.1rem, 4vw, 3.2rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .notice {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      font-weight: 600;
      line-height: 1.35;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      display: grid;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #bcd6c2;
      box-shadow: 0 18px 36px rgba(34, 74, 49, 0.12);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #f4faf5;
    }

    .thumb svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .label {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Gin interactives</h1>

    <div class="notice">
      All of these interactives are simply proof of concept. All of the relationships require more research. There are many parts which do not work.
    </div>

    <section class="grid" id="grid"></section>

    <p class="footer-note">I haven't put a home button in any of these, so you'll have to use the back button.</p>
  </main>

  <script>
    const baseUrl = "https://physicalsmithness.github.io/sundairy/gin/";

    const items = [
      {
        title: "Botanical balance builder",
        file: "1. gin_botanical_balance_builder_(click_botanicals_top_right_too).html",
        kind: "botanical_builder"
      },
      {
        title: "Extraction method comparator",
        file: "2. gin_extraction_method_comparator.html",
        kind: "extraction"
      },
      {
        title: "Serve science simulator",
        file: "3. gin_serve_science_simulator.html",
        kind: "serve"
      },
      {
        title: "Personal palate map",
        file: "4. gin_personal_palate_map_weighted.html",
        kind: "palate"
      },
      {
        title: "Gin styles comparison tool",
        file: "5. gin_styles_comparison_tool.html",
        kind: "compare"
      },
      {
        title: "Dilution temperature explorer",
        file: "6. gin_dilution_temperature_explorer.html",
        kind: "dilution"
      },
      {
        title: "Garnish pairing engine",
        file: "7. gin_garnish_pairing_engine.html",
        kind: "garnish"
      },
      {
        title: "Botanical constellation (links vague)",
        file: "8a. gin_botanical_constellation (but links vague).html",
        kind: "constellation_vague"
      },
      {
        title: "Botanical constellation (squashed)",
        file: "8b. gin botanical constellation (but squashed).html",
        kind: "constellation_squashed"
      },
      {
        title: "Cocktail architecture visualiser",
        file: "9. gin_cocktail_architecture_visualiser.html",
        kind: "architecture"
      },
      {
        title: "Sensory quiz game",
        file: "10. gin sensory quiz game.html",
        kind: "quiz"
      }
    ];

    function enc(file) {
      return baseUrl + encodeURIComponent(file);
    }

    function thumb(kind) {
      const common = '<rect x="0" y="0" width="160" height="100" rx="14" fill="#f6fbf7"/><rect x="8" y="8" width="144" height="84" rx="12" fill="#ffffff"/>';
      switch (kind) {
        case "botanical_builder":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <circle cx="45" cy="50" r="18" fill="#d9f2de"/>
              <circle cx="80" cy="36" r="13" fill="#f5e7ae"/>
              <circle cx="110" cy="60" r="15" fill="#cfe9ff"/>
              <path d="M45 50L80 36L110 60" stroke="#5ab777" stroke-width="3" fill="none" stroke-linecap="round"/>
            </svg>`;
        case "extraction":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <path d="M18 74C36 58 52 46 72 38C92 30 114 24 142 20" stroke="#d4ab45" stroke-width="4" fill="none" stroke-linecap="round"/>
              <line x1="18" y1="74" x2="142" y2="74" stroke="#dce8df" stroke-width="2"/>
              <line x1="18" y1="20" x2="18" y2="74" stroke="#dce8df" stroke-width="2"/>
            </svg>`;
        case "serve":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <rect x="36" y="28" width="32" height="40" rx="8" fill="#d8e9f3"/>
              <rect x="72" y="20" width="32" height="48" rx="8" fill="#d9f2de"/>
              <rect x="108" y="34" width="18" height="34" rx="6" fill="#f6d8dc"/>
              <circle cx="52" cy="28" r="7" fill="#ffffff"/>
            </svg>`;
        case "palate":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <polygon points="80,18 108,36 98,70 62,70 52,36" fill="rgba(85,187,120,0.22)" stroke="#55bb78" stroke-width="3"/>
              <polygon points="80,30 96,40 90,60 70,60 64,40" fill="rgba(120,168,217,0.2)" stroke="#78a8d9" stroke-width="2"/>
            </svg>`;
        case "compare":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <rect x="28" y="54" width="24" height="18" rx="6" fill="#55bb78"/>
              <rect x="60" y="38" width="24" height="34" rx="6" fill="#d4ab45"/>
              <rect x="92" y="24" width="24" height="48" rx="6" fill="#78a8d9"/>
              <rect x="124" y="46" width="12" height="26" rx="5" fill="#d998b8"/>
            </svg>`;
        case "dilution":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <path d="M20 64C38 52 52 46 68 44C84 42 96 30 114 28C126 27 134 31 142 36" stroke="#4f99bf" stroke-width="4" fill="none" stroke-linecap="round"/>
              <path d="M20 30C30 34 42 40 54 50C66 60 84 66 142 70" stroke="#55bb78" stroke-width="4" fill="none" stroke-linecap="round"/>
            </svg>`;
        case "garnish":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <circle cx="80" cy="50" r="18" fill="#d9f2de" stroke="#55bb78" stroke-width="3"/>
              <circle cx="36" cy="34" r="9" fill="#f5e7ae"/>
              <circle cx="126" cy="34" r="9" fill="#f6d8dc"/>
              <circle cx="36" cy="68" r="9" fill="#d8e9f3"/>
              <circle cx="126" cy="68" r="9" fill="#d9f2de"/>
              <path d="M80 50L36 34M80 50L126 34M80 50L36 68M80 50L126 68" stroke="#cfded3" stroke-width="2.5" fill="none"/>
            </svg>`;
        case "constellation_vague":
        case "constellation_squashed":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="0" y="0" width="160" height="100" rx="14" fill="#102019"/>
              <circle cx="32" cy="28" r="4" fill="#f1a5a8"/>
              <circle cx="62" cy="58" r="6" fill="#6fd38d"/>
              <circle cx="92" cy="34" r="5" fill="#f0cb61"/>
              <circle cx="120" cy="66" r="5" fill="#d79ae9"/>
              <circle cx="138" cy="26" r="3" fill="#69c2a0"/>
              <path d="M32 28L62 58L92 34L120 66" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" fill="none"/>
            </svg>`;
        case "architecture":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <rect x="22" y="22" width="116" height="56" rx="12" fill="#f9fcfa" stroke="#dbe8df"/>
              <rect x="28" y="34" width="64" height="12" rx="6" fill="#4f99bf"/>
              <rect x="28" y="54" width="92" height="12" rx="6" fill="#55bb78"/>
              <rect x="98" y="24" width="32" height="44" rx="10" fill="#eef6f1" stroke="#dbe8df"/>
            </svg>`;
        case "quiz":
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
              <rect x="20" y="24" width="52" height="16" rx="8" fill="#d9f2de"/>
              <rect x="82" y="24" width="58" height="16" rx="8" fill="#f5e7ae"/>
              <rect x="20" y="48" width="40" height="16" rx="8" fill="#d8e9f3"/>
              <rect x="70" y="48" width="70" height="16" rx="8" fill="#f6d8dc"/>
              <circle cx="126" cy="76" r="8" fill="#55bb78"/>
            </svg>`;
        default:
          return `
            <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              ${common}
            </svg>`;
      }
    }

    const grid = document.getElementById("grid");
    items.forEach(item => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = enc(item.file);
      a.innerHTML = `
        <div class="thumb">${thumb(item.kind)}</div>
        <div class="label">${item.title}</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
